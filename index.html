<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width initial-scale=1.0"
  <meta name="google-site-verification" content="1wjrz7teSbAT_Tvv3xaR9rBuXVz8k-95nalm3RVDaOk" />
  <link rel="stylesheet" href="form.css" />
</head>
<body>
<form action="//formspree.io/f/mnjengoa" method="POST">
  <h1>Hotel Stay Feedback</h1>

  <fieldset>
    <legend>Personal Information</legend>
    <label for="name">Name (required):</label>
    <input
      type="text"
      id="name"
      name="name"
      placeholder="e.g., Bryan Lebone"
      required
    />

    <label for="email">Email address (required):</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="example@email.com"
      required
    />

    <label for="age">Age (required):</label>
    <input
      type="number"
      id="age"
      name="age"
      placeholder="must be 18 above"
      required
      min="18"
    />
  </fieldset>

  <fieldset>
    <legend>Is this your first time at a hotel?</legend>
    <label><input type="radio" name="first_time" value="yes" /> Yes</label>
    <label><input type="radio" name="first_time" value="no" /> No</label>
  </fieldset>

  <fieldset>
    <legend>
      Why did you choose to stay at our hotel? (Check all that apply)
    </legend>
    <label
      ><input type="checkbox" name="reason" value="social_media_ads" /> Social
      Media Ads</label
    >
    <label
      ><input type="checkbox" name="reason" value="personal_recommendation" />
      Personal Recommendation</label
    >
    <label
      ><input type="checkbox" name="reason" value="location" /> Location</label
    >
    <label
      ><input type="checkbox" name="reason" value="reputation" />
      Reputation</label
    >
    <label><input type="checkbox" name="reason" value="price" /> Price</label>
  </fieldset>

  <fieldset>
    <legend>Ratings</legend>
    <label for="service">How was the service?</label>
    <select id="service" name="service">
      <option value="poor">Poor</option>
      <option value="satisfactory">Satisfactory</option>
      <option value="good">Good</option>
      <option value="excellent" selected>Excellent</option>
    </select>

    <label for="food">How was the food?</label>
    <select id="food" name="food">
      <option value="poor">Poor</option>
      <option value="satisfactory">Satisfactory</option>
      <option value="good">Good</option>
      <option value="excellent" selected>Excellent</option>
    </select>
  </fieldset>

  <button type="submit">Submit</button>
</form>
</body>

  
</html>
